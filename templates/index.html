<!DOCTYPE html>
<html>
<head>
    <title>Password Checker</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            width: 250px;
            border-radius: 8px;
            border: none;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
        }

        .tips {
            margin-top: 10px;
            color: #f87171;
        }
    </style>
</head>

<body>

    <h1>🔐 Password Strength Checker</h1>

    <form method="POST">
        <input type="text" name="password" placeholder="Enter password" required>
        <br>
        <button type="submit">Check</button>
    </form>

    <div class="result">{{ result }}</div>

    <div class="tips">
        {% for tip in tips %}
            <p>{{ tip }}</p>
        {% endfor %}
    </div>

</body>
</html>
